<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodrigo Vidal — Transformación & Liderazgo</title>
    <meta name="description" content="Líder de Transformación con +19 años en el sector financiero. Diagnostico, construyo y transformo.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --ink-mid: #3d3d3d;
            --ink-light: #6b6b6b;
            --paper: #fafaf8;
            --paper-warm: #f4f1eb;
            --accent: #1B5E7B;
            --accent-warm: #c8622d;
            --border: #ddd9d0;
            --serif: 'DM Serif Display', Georgia, serif;
            --sans: 'DM Sans', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; }

        body {
            font-family: var(--sans);
            color: var(--ink);
            background: var(--paper);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(250,250,248,0.94);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            transition: transform 0.3s ease;
        }
        .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 58px;
        }
        .nav-name {
            font-family: var(--serif);
            font-size: 1.05rem;
            color: var(--ink);
            text-decoration: none;
            letter-spacing: -0.01em;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        .nav-links a {
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ink-light);
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--accent); }

        /* HERO */
        .hero {
            padding: 7rem 2rem 5rem;
            background: var(--paper);
            border-bottom: 1px solid var(--border);
        }
        .hero-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: flex-start;
            gap: 4rem;
        }
        .hero-text { flex: 1; }
        .hero-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 1.2rem;
        }
        .hero-title {
            font-family: var(--serif);
            font-size: clamp(2.4rem, 5vw, 3.8rem);
            line-height: 1.08;
            letter-spacing: -0.03em;
            color: var(--ink);
            margin-bottom: 1.6rem;
        }
        .hero-title em {
            font-style: italic;
            color: var(--accent);
        }
        .hero-sub {
            font-size: 1.1rem;
            color: var(--ink-mid);
            line-height: 1.65;
            max-width: 520px;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }
        .hero-meta {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .hero-meta-item {
            font-size: 0.85rem;
            color: var(--ink-light);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .hero-meta-item a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .hero-photo {
            width: 220px;
            flex-shrink: 0;
        }
        .hero-photo img {
            width: 100%;
            display: block;
            border-radius: 2px;
            filter: grayscale(8%);
        }

        /* SECTIONS */
        .section {
            padding: 5rem 2rem;
        }
        .section:nth-child(even) {
            background: var(--paper-warm);
        }
        .container {
            max-width: 860px;
            margin: 0 auto;
        }
        .section-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--accent-warm);
            margin-bottom: 0.8rem;
        }
        .section h2 {
            font-family: var(--serif);
            font-size: clamp(1.8rem, 3.5vw, 2.6rem);
            line-height: 1.15;
            letter-spacing: -0.025em;
            color: var(--ink);
            margin-bottom: 2rem;
        }
        .section h2 em {
            font-style: italic;
            color: var(--accent);
        }
        .body-text p {
            font-size: 1.05rem;
            color: var(--ink-mid);
            line-height: 1.8;
            margin-bottom: 1.2rem;
            font-weight: 300;
        }
        .body-text p:last-child { margin-bottom: 0; }
        .body-text strong {
            font-weight: 600;
            color: var(--ink);
        }

        /* MÉTODO — pasos */
        .method-steps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 2rem;
            margin-top: 2.5rem;
        }
        .step {
            border-top: 2px solid var(--accent);
            padding-top: 1rem;
        }
        .step-num {
            font-family: var(--serif);
            font-size: 2rem;
            color: var(--accent);
            opacity: 0.3;
            line-height: 1;
            margin-bottom: 0.3rem;
        }
        .step-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--ink);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .step-text {
            font-size: 0.88rem;
            color: var(--ink-light);
            line-height: 1.55;
        }

        /* FILOSOFÍA — cita */
        .quote-block {
            border-left: 3px solid var(--accent);
            padding: 1.5rem 2rem;
            margin: 3rem 0;
            background: rgba(27,94,123,0.04);
        }
        .quote-block p {
            font-family: var(--serif);
            font-size: 1.2rem;
            color: var(--ink);
            font-style: italic;
            line-height: 1.6;
            margin: 0;
        }

        /* TRAYECTORIA */
        .timeline {
            margin-top: 2.5rem;
            position: relative;
        }
        .timeline-item {
            display: grid;
            grid-template-columns: 130px 1fr;
            gap: 2rem;
            margin-bottom: 2.5rem;
            padding-bottom: 2.5rem;
            border-bottom: 1px solid var(--border);
        }
        .timeline-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .timeline-period {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--ink-light);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding-top: 0.15rem;
        }
        .timeline-content h3 {
            font-family: var(--serif);
            font-size: 1.15rem;
            color: var(--ink);
            margin-bottom: 0.2rem;
        }
        .timeline-org {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.6rem;
        }
        .timeline-desc {
            font-size: 0.93rem;
            color: var(--ink-mid);
            line-height: 1.65;
            font-weight: 300;
        }

        /* VISIÓN */
        .vision-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-top: 2rem;
        }
        .vision-col h3 {
            font-family: var(--serif);
            font-size: 1.1rem;
            color: var(--ink);
            margin-bottom: 0.8rem;
        }
        .vision-col p {
            font-size: 0.95rem;
            color: var(--ink-mid);
            line-height: 1.75;
            font-weight: 300;
        }

        /* CONTACTO */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2.5rem;
        }
        .contact-item {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .contact-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-light);
        }
        .contact-value {
            font-size: 0.95rem;
            color: var(--ink);
        }
        .contact-value a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .contact-value a:hover { text-decoration: underline; }

        /* FOOTER */
        footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--ink-light);
            background: var(--paper);
        }

        /* FADE IN */
        .fade-in {
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* PROYECTOS & LABORATORIO */
        #proyectos {
            padding: 5rem 2rem;
            background: #f4f1eb;
        }
        #laboratorio {
            padding: 5rem 2rem;
            background: #fafaf8;
            border-top: 1px solid #e0ddd6;
        }
        .proy-inner {
            max-width: 1060px;
            margin: 0 auto;
        }
        .proy-label {
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: #c8622d;
            margin-bottom: 0.6rem;
        }
        .proy-titulo {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(1.9rem, 3.5vw, 2.6rem);
            color: #1a1a2e;
            line-height: 1.18;
            margin-bottom: 0.8rem;
            letter-spacing: -0.02em;
        }
        .proy-sub {
            font-size: 1.05rem;
            color: #6b6b8d;
            max-width: 580px;
            margin-bottom: 3rem;
            font-weight: 300;
        }
        .proy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.4rem;
        }
        .proy-card {
            background: #fff;
            border: 1px solid #e0ddd6;
            border-radius: 4px;
            padding: 2rem 1.8rem;
            position: relative;
            transition: box-shadow 0.25s ease, transform 0.25s ease;
        }
        .proy-card:hover {
            box-shadow: 0 8px 28px rgba(26,26,46,0.09);
            transform: translateY(-3px);
        }
        .proy-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: #c8622d;
            border-radius: 4px 0 0 4px;
        }
        .proy-num {
            font-family: 'DM Serif Display', serif;
            font-size: 2.6rem;
            color: #c8622d;
            opacity: 0.18;
            line-height: 1;
            margin-bottom: 0.4rem;
            letter-spacing: -0.04em;
        }
        .proy-nombre {
            font-family: 'DM Serif Display', serif;
            font-size: 1.18rem;
            color: #1a1a2e;
            margin-bottom: 0.3rem;
        }
        .proy-empresa {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #6b6b8d;
            margin-bottom: 0.9rem;
        }
        .proy-desc {
            font-size: 0.92rem;
            color: #3a3a5c;
            line-height: 1.65;
            margin-bottom: 1.3rem;
        }
        .proy-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
        }
        .badge {
            background: rgba(200,98,45,0.08);
            border: 1px solid rgba(200,98,45,0.22);
            color: #c8622d;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 0.26rem 0.65rem;
            border-radius: 2px;
        }

        .lab-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

            font-size: 0.87rem;
            color: #
